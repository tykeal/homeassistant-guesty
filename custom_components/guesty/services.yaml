send_guest_message:
  name: Send guest message
  description: >-
    Send a message to a guest via their Guesty reservation
    conversation.
  target:
    entity:
      integration: guesty
      domain: notify
  fields:
    message:
      name: Message
      description: The message body to send.
      required: true
      example: "Welcome to your stay!"
      selector:
        text:
    reservation_id:
      name: Reservation ID
      description: The Guesty reservation ID for the guest.
      required: true
      example: "abc123def456"
      selector:
        text:
    channel:
      name: Channel
      description: >-
        Messaging channel to use (e.g., email, sms, airbnb2).
        If omitted, Guesty selects the default channel.
      required: false
      example: "email"
      selector:
        text:
    template_variables:
      name: Template variables
      description: >-
        Key-value pairs for template variable substitution in
        the message body.
      required: false
      example:
        guest_name: "John"
        check_in: "2025-01-15"
      selector:
        object:

set_custom_field:
  name: Set custom field
  description: >-
    Set a custom field value on a Guesty listing or
    reservation.
  fields:
    target_type:
      name: Target type
      description: >-
        Entity type to update (listing or reservation).
      required: true
      example: "listing"
      selector:
        select:
          options:
            - listing
            - reservation
    target_id:
      name: Target ID
      description: >-
        The Guesty listing or reservation ID to update.
      required: true
      example: "637bad36abcdef123456"
      selector:
        text:
    field_id:
      name: Field ID
      description: >-
        The custom field definition ID.
      required: true
      example: "637bad36abcdef789012"
      selector:
        text:
    value:
      name: Value
      description: >-
        The value to set. Type must match the field
        definition (text, number, or boolean).
      required: true
      example: "new-value"
      selector:
        object:

get_custom_fields:
  name: Get custom fields
  description: >-
    Return all custom field definitions from the cached
    Guesty custom fields coordinator.
  fields:
    config_entry_id:
      name: Config entry ID
      description: >-
        Target a specific Guesty config entry. Required only
        when multiple Guesty accounts are configured.
      required: false
      selector:
        config_entry:
          integration: guesty

get_custom_field_values:
  name: Get custom field values
  description: >-
    Return the current custom field values for a Guesty
    listing or reservation.
  fields:
    target_type:
      name: Target type
      description: >-
        Entity type to read (listing or reservation).
      required: true
      example: "listing"
      selector:
        select:
          options:
            - listing
            - reservation
    target_id:
      name: Target ID
      description: >-
        The Guesty listing or reservation ID to read.
      required: true
      example: "637bad36abcdef123456"
      selector:
        text:
    config_entry_id:
      name: Config entry ID
      description: >-
        Target a specific Guesty config entry. Required only
        when multiple Guesty accounts are configured.
      required: false
      selector:
        config_entry:
          integration: guesty

add_reservation_note:
  name: Add reservation note
  description: >-
    Append a note to a Guesty reservation. New text is added
    after existing notes with a separator.
  fields:
    reservation_id:
      name: Reservation ID
      description: The Guesty reservation identifier.
      required: true
      example: "abc123def456"
      selector:
        text:
    note_text:
      name: Note text
      description: The note content to append.
      required: true
      example: "Guest requested early check-in."
      selector:
        text:
    config_entry_id:
      name: Config entry ID
      description: >-
        Target a specific Guesty config entry. Required only
        when multiple Guesty accounts are configured.
      required: false
      selector:
        config_entry:
          integration: guesty

set_listing_status:
  name: Set listing status
  description: >-
    Activate or deactivate a Guesty listing.
  fields:
    listing_id:
      name: Listing ID
      description: The Guesty listing identifier.
      required: true
      example: "abc123def456"
      selector:
        text:
    status:
      name: Status
      description: "The target status: active or inactive."
      required: true
      example: "active"
      selector:
        select:
          options:
            - label: Active
              value: active
            - label: Inactive
              value: inactive
    config_entry_id:
      name: Config entry ID
      description: >-
        Target a specific Guesty config entry. Required only
        when multiple Guesty accounts are configured.
      required: false
      selector:
        config_entry:
          integration: guesty

create_task:
  name: Create task
  description: >-
    Create an operational task for a Guesty listing (e.g.,
    cleaning, maintenance).
  fields:
    listing_id:
      name: Listing ID
      description: The Guesty listing identifier.
      required: true
      example: "abc123def456"
      selector:
        text:
    task_title:
      name: Task title
      description: Title for the new task.
      required: true
      example: "Deep clean unit"
      selector:
        text:
    description:
      name: Description
      description: Optional task description with details.
      required: false
      example: "Full deep clean including carpets."
      selector:
        text:
    assignee:
      name: Assignee
      description: Optional assignee user identifier.
      required: false
      example: "user123"
      selector:
        text:
    config_entry_id:
      name: Config entry ID
      description: >-
        Target a specific Guesty config entry. Required only
        when multiple Guesty accounts are configured.
      required: false
      selector:
        config_entry:
          integration: guesty

set_calendar_availability:
  name: Set calendar availability
  description: >-
    Block or unblock a date range on a Guesty listing calendar.
  fields:
    listing_id:
      name: Listing ID
      description: The Guesty listing identifier.
      required: true
      example: "abc123def456"
      selector:
        text:
    start_date:
      name: Start date
      description: Start date in YYYY-MM-DD format.
      required: true
      example: "2025-08-01"
      selector:
        date:
    end_date:
      name: End date
      description: End date in YYYY-MM-DD format.
      required: true
      example: "2025-08-05"
      selector:
        date:
    operation:
      name: Operation
      description: "Calendar operation: block or unblock."
      required: true
      example: "block"
      selector:
        select:
          options:
            - label: Block
              value: block
            - label: Unblock
              value: unblock
    config_entry_id:
      name: Config entry ID
      description: >-
        Target a specific Guesty config entry. Required only
        when multiple Guesty accounts are configured.
      required: false
      selector:
        config_entry:
          integration: guesty

update_reservation_custom_field:
  name: Update reservation custom field
  description: >-
    Update a custom field value on a Guesty reservation.
  fields:
    reservation_id:
      name: Reservation ID
      description: The Guesty reservation identifier.
      required: true
      example: "abc123def456"
      selector:
        text:
    field_id:
      name: Field ID
      description: The custom field identifier.
      required: true
      example: "cf_vip_status"
      selector:
        text:
    value:
      name: Value
      description: The new value for the custom field.
      required: true
      example: "VIP"
      selector:
        text:
    config_entry_id:
      name: Config entry ID
      description: >-
        Target a specific Guesty config entry. Required only
        when multiple Guesty accounts are configured.
      required: false
      selector:
        config_entry:
          integration: guesty
