---
ignore:
  # pillow transitive dependency via homeassistant —
  # buffer over-read in PcxDecode (CVE-2025-2312).
  - vulnerability: GHSA-4xh5-x5gv-qwph
    package:
      name: pillow
      type: python

  # pillow transitive dependency via homeassistant —
  # PSD out-of-bounds write (CVE-2026-25990).
  - vulnerability: GHSA-cfh3-3jmp-rvhc
    package:
      name: pillow
      type: python

  # PyJWT transitive dependency via homeassistant —
  # accepts unknown crit header extensions
  # (CVE-2026-32597).
  - vulnerability: CVE-2026-32597
    package:
      name: PyJWT
      type: python

  - vulnerability: GHSA-752w-5fwx-jx9f
    package:
      name: PyJWT
      type: python

  # pyOpenSSL transitive dependency via homeassistant —
  # use-after-free on connection shutdown.
  - vulnerability: GHSA-5pwr-322w-8jr4
    package:
      name: pyOpenSSL
      type: python

  - vulnerability: GHSA-vp96-hxj8-p424
    package:
      name: pyOpenSSL
      type: python

  # orjson transitive dependency via homeassistant —
  # unlimited recursion depth in orjson.dumps.
  - vulnerability: GHSA-hx9q-6w63-j58v
    package:
      name: orjson
      type: python

  # pygments transitive dependency via homeassistant —
  # ReDoS in AdlLexer (CVE-2026-4539).
  - vulnerability: CVE-2026-4539
    package:
      name: pygments
      type: python

  # Transitive dep CVEs (via homeassistant).
  - vulnerability: CVE-2026-27448

  - vulnerability: CVE-2026-27459

  - vulnerability: CVE-2025-67221

  # aiohttp transitive dependency via homeassistant —
  # multiple medium-severity CVEs in 3.13.3 (fixed in
  # 3.13.4). We cannot pin aiohttp directly.
  - vulnerability: GHSA-c427-h43c-vf67
    package:
      name: aiohttp
      type: python

  - vulnerability: GHSA-p998-jp59-783m
    package:
      name: aiohttp
      type: python

  - vulnerability: GHSA-w2fm-2cpv-w7v5
    package:
      name: aiohttp
      type: python

  - vulnerability: GHSA-m5qp-6w8w-w647
    package:
      name: aiohttp
      type: python

  # cryptography transitive dependency via homeassistant —
  # buffer overflow with non-contiguous Python buffers.
  - vulnerability: GHSA-p423-j2cm-9vmq
    package:
      name: cryptography
      type: python

  # cryptography transitive dependency via homeassistant —
  # DNS name constraints not validated against peer
  # names.
  - vulnerability: GHSA-m959-cc7f-wv43
    package:
      name: cryptography
      type: python

  # requests transitive dependency via homeassistant —
  # CVE in 2.32.5 (fixed in 2.33.0).
  - vulnerability: GHSA-gc5v-m9x4-r6x2
    package:
      name: requests
      type: python
